{% extends "base.html" %}
{% load static %}

{% block title %}{% if object %}Edit post{% else %}New post{% endif %} — Chatter{% endblock %}

{% block content %}
    <div class="rounded-2xl border border-border bg-surface p-5 shadow-sm sm:p-6">
        <h1 class="mb-4 text-2xl font-extrabold tracking-tight">{% if object %}Edit post{% else %}New post{% endif %}</h1>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">{% if object %}Save{% else %}Post{% endif %}</button>
        </form>
    </div>
    <script src="{% static 'posts/js/mention_autocomplete.js' %}"></script>
{% endblock %}
