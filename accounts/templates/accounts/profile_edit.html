{% extends "base.html" %}

{% block title %}Edit profile — Chatter{% endblock %}

{% block content %}
    <h1 class="mb-4 text-2xl font-bold">Edit profile</h1>
    {% if object.avatar %}
        <img src="{{ object.avatar.url }}" alt="{{ request.user.username }}" class="mb-4 h-20 w-20 rounded-full object-cover">
    {% endif %}
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save</button>
    </form>
{% endblock %}
