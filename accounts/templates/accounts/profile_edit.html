{% extends "base.html" %}

{% block title %}Edit profile — Chatter{% endblock %}

{% block content %}
    <h1>Edit profile</h1>
    {% if object.avatar %}
        <img src="{{ object.avatar.url }}" alt="{{ request.user.username }}" class="avatar">
    {% endif %}
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Save</button>
    </form>
{% endblock %}
