{% extends "base.html" %}

{% block title %}Edit profile — Chatter{% endblock %}

{% block content %}
    <div class="mx-auto max-w-md rounded-2xl border border-border bg-surface p-6 shadow-sm sm:p-8">
        <h1 class="mb-6 text-2xl font-extrabold tracking-tight">Edit profile</h1>
        {% if object.avatar %}
            <img src="{{ object.avatar.url }}" alt="{{ request.user.username }}" class="mb-4 h-20 w-20 rounded-full object-cover shadow-sm ring-4 ring-surface-hover">
        {% endif %}
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit">Save</button>
        </form>
        <a href="{% url 'password-change' %}" class="mt-4 inline-block text-sm font-medium text-accent no-underline hover:underline">
            {% if request.user.has_usable_password %}Change password{% else %}Set a password{% endif %}
        </a>
    </div>
{% endblock %}
