{% extends "base.html" %}
{% load socialaccount %}

{% block title %}Register — Chatter{% endblock %}

{% block content %}

        {% csrf_token %}
        {{ form.as_p }}

    <p><a href="{% provider_login_url 'google' %}" class="button-secondary">Continue with Google</a></p>
{% endblock %}
