{% load static user_extras %}
<header class="sticky top-0 z-10 border-b border-border bg-surface/80 backdrop-blur">
    <div class="relative mx-auto flex max-w-[700px] items-center justify-between px-4 py-3">
        <a href="{% url 'feed' %}" class="flex items-center gap-2 text-lg font-extrabold tracking-tight text-fg no-underline">
            <span class="flex h-8 w-8 items-center justify-center rounded-xl bg-gradient-to-br from-accent to-downvote text-base font-black text-white shadow-sm">C</span>
            Chatter
        </a>

        <input type="checkbox" id="mobile-nav-toggle" class="peer/nav hidden">

        <nav class="hidden flex-col items-stretch gap-1 text-sm font-medium peer-checked/nav:absolute peer-checked/nav:right-0 peer-checked/nav:top-full peer-checked/nav:z-10 peer-checked/nav:flex peer-checked/nav:w-56 peer-checked/nav:rounded-2xl peer-checked/nav:border peer-checked/nav:border-border peer-checked/nav:bg-surface peer-checked/nav:p-2 peer-checked/nav:shadow-lg sm:static sm:flex sm:w-auto sm:flex-row sm:items-center sm:border-none sm:bg-transparent sm:p-0 sm:shadow-none">
            <a href="{% url 'simulations-hub' %}" class="rounded-full px-3 py-1.5 text-fg no-underline transition-colors hover:bg-surface-hover">Simulations</a>
            {% if user.is_authenticated %}
            <a href="{% url 'games-hub' %}" class="relative rounded-full px-3 py-1.5 text-fg no-underline transition-colors hover:bg-surface-hover">
                Games
                <span
                id="your-turn-badge"
                data-count-url="{% url 'your-turn-count' %}"
                class="absolute -right-1 -top-1 flex h-4 min-w-4 items-center justify-center rounded-full bg-accent px-1 text-[10px] font-bold text-accent-fg {% if not your_turn_count %}hidden{% endif %}"
                >{{ your_turn_count }}</span>
            </a>
            <a href="{% url 'post-create' %}" class="rounded-full px-3 py-1.5 text-fg no-underline transition-colors hover:bg-surface-hover">New post</a>
                <a href="{% url 'conversation-list' %}" class="relative rounded-full px-3 py-1.5 text-fg no-underline transition-colors hover:bg-surface-hover">
                    Messages
                    <span
                        id="unread-message-badge"
                        data-count-url="{% url 'unread-message-count' %}"
                        class="absolute -right-1 -top-1 flex h-4 min-w-4 items-center justify-center rounded-full bg-accent px-1 text-[10px] font-bold text-accent-fg {% if not unread_message_count %}hidden{% endif %}"
                    >{{ unread_message_count }}</span>
                </a>
                <a href="{% url 'notification-list' %}" class="relative rounded-full px-3 py-1.5 text-fg no-underline transition-colors hover:bg-surface-hover">
                    Notifications
                    <span
                        id="notification-badge"
                        data-count-url="{% url 'unread-notification-count' %}"
                        class="absolute -right-1 -top-1 flex h-4 min-w-4 items-center justify-center rounded-full bg-accent px-1 text-[10px] font-bold text-accent-fg {% if not unread_notification_count %}hidden{% endif %}"
                    >{{ unread_notification_count }}</span>
                </a>
                <a href="{% url 'profile' user.username %}" class="rounded-full px-3 py-1.5 text-fg no-underline transition-colors hover:bg-surface-hover">{{ user.username|at_username }}</a>
                <form action="{% url 'logout' %}" method="post" class="inline">
                    {% csrf_token %}
                    <button type="submit" class="mt-0 rounded-full border-none bg-transparent px-3 py-1.5 font-medium text-muted transition-colors hover:bg-surface-hover hover:text-fg">Log out</button>
                </form>
                <script src="{% static 'games/js/your_turn_badge.js' %}"></script>
                <script src="{% static 'posts/js/unread_message_badge.js' %}"></script>
                <script src="{% static 'posts/js/notification_badge.js' %}"></script>
            {% else %}
                <a href="{% url 'login' %}" class="rounded-full px-3 py-1.5 text-fg no-underline transition-colors hover:bg-surface-hover">Log in</a>
                <a href="{% url 'register' %}" class="rounded-full bg-accent px-3 py-1.5 text-accent-fg no-underline transition-opacity hover:opacity-90">Register</a>
            {% endif %}
            <button type="button" onclick="toggleTheme()" aria-label="Toggle dark mode" class="mt-0 flex items-center gap-2 rounded-full border-none bg-transparent px-3 py-1.5 text-left text-muted transition-colors hover:bg-surface-hover hover:text-fg sm:ml-1 sm:justify-center sm:p-2">
                <svg viewBox="0 0 20 20" fill="currentColor" class="block h-5 w-5 dark:hidden"><path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd"/></svg>
                <svg viewBox="0 0 20 20" fill="currentColor" class="hidden h-5 w-5 dark:block"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"/></svg>
                <span class="sm:hidden">Toggle theme</span>
            </button>
        </nav>

        <label for="mobile-nav-toggle" class="flex items-center justify-center rounded-full border-none bg-transparent p-2 text-muted transition-colors hover:bg-surface-hover hover:text-fg sm:hidden" aria-label="Menu">
            <svg viewBox="0 0 20 20" fill="currentColor" class="h-5 w-5"><path fill-rule="evenodd" d="M3 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm0 5a1 1 0 011-1h12a1 1 0 110 2H4a1 1 0 01-1-1zm1 4a1 1 0 100 2h12a1 1 0 100-2H4z" clip-rule="evenodd"/></svg>
        </label>
    </div>
</header>
