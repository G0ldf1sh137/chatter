<div class="flex flex-shrink-0 flex-col items-center gap-0.5 rounded-xl bg-surface-hover p-1.5">
    {% if user.is_authenticated %}
        <form method="post" action="{% url 'post-upvote' post.pk %}" class="inline">
            {% csrf_token %}
            <button type="submit" class="mt-0 flex items-center justify-center rounded-lg border-none bg-transparent p-1 transition-colors hover:bg-border/60 {% if post.user_vote == 1 %}text-upvote hover:text-upvote{% else %}text-muted hover:text-fg{% endif %}" aria-label="Upvote">
                <svg viewBox="0 0 20 20" fill="currentColor" class="h-4 w-4"><path d="M10 6l6 7H4l6-7z"/></svg>
            </button>
        </form>
    {% else %}
        <span class="flex items-center justify-center p-1 text-border">
            <svg viewBox="0 0 20 20" fill="currentColor" class="h-4 w-4"><path d="M10 6l6 7H4l6-7z"/></svg>
        </span>
    {% endif %}
    <span class="min-w-5 text-center text-xs font-bold text-fg">{{ post.score }}</span>
    {% if user.is_authenticated %}
        <form method="post" action="{% url 'post-downvote' post.pk %}" class="inline">
            {% csrf_token %}
            <button type="submit" class="mt-0 flex items-center justify-center rounded-lg border-none bg-transparent p-1 transition-colors hover:bg-border/60 {% if post.user_vote == -1 %}text-downvote hover:text-downvote{% else %}text-muted hover:text-fg{% endif %}" aria-label="Downvote">
                <svg viewBox="0 0 20 20" fill="currentColor" class="h-4 w-4"><path d="M10 14l-6-7h12l-6 7z"/></svg>
            </button>
        </form>
    {% else %}
        <span class="flex items-center justify-center p-1 text-border">
            <svg viewBox="0 0 20 20" fill="currentColor" class="h-4 w-4"><path d="M10 14l-6-7h12l-6 7z"/></svg>
        </span>
    {% endif %}
</div>
