<div class="flex flex-shrink-0 flex-col items-center text-gray-500">
    {% if user.is_authenticated %}
        <form method="post" action="{% url 'post-upvote' post.pk %}" class="inline">
            {% csrf_token %}
            <button type="submit" class="m-0 border-none bg-transparent p-0 py-0.5 text-sm leading-none text-gray-500 cursor-pointer {% if post.user_vote == 1 %}text-upvote{% endif %}" aria-label="Upvote">&#9650;</button>
        </form>
    {% else %}
        <span class="py-0.5 text-sm leading-none text-gray-300">&#9650;</span>
    {% endif %}
    <span class="min-w-5 text-center text-xs font-semibold">{{ post.score }}</span>
    {% if user.is_authenticated %}
        <form method="post" action="{% url 'post-downvote' post.pk %}" class="inline">
            {% csrf_token %}
            <button type="submit" class="m-0 border-none bg-transparent p-0 py-0.5 text-sm leading-none text-gray-500 cursor-pointer {% if post.user_vote == -1 %}text-accent{% endif %}" aria-label="Downvote">&#9660;</button>
        </form>
    {% else %}
        <span class="py-0.5 text-sm leading-none text-gray-300">&#9660;</span>
    {% endif %}
</div>
