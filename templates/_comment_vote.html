<span class="vote-widget vote-horizontal">
    {% if user.is_authenticated %}
        <form method="post" action="{% url 'comment-upvote' comment.pk %}" class="inline-form">
            {% csrf_token %}
            <button type="submit" class="vote-button {% if comment.user_vote == 1 %}vote-active-up{% endif %}" aria-label="Upvote">&#9650;</button>
        </form>
    {% else %}
        <span class="vote-button vote-disabled">&#9650;</span>
    {% endif %}
    <span class="vote-score">{{ comment.score }}</span>
    {% if user.is_authenticated %}
        <form method="post" action="{% url 'comment-downvote' comment.pk %}" class="inline-form">
            {% csrf_token %}
            <button type="submit" class="vote-button {% if comment.user_vote == -1 %}vote-active-down{% endif %}" aria-label="Downvote">&#9660;</button>
        </form>
    {% else %}
        <span class="vote-button vote-disabled">&#9660;</span>
    {% endif %}
</span>
