<span class="inline-flex items-center gap-0.5 rounded-full bg-surface-hover px-1 py-0.5">
    {% if user.is_authenticated %}
        <form method="post" action="{% url 'comment-upvote' comment.pk %}" class="inline">
            {% csrf_token %}
            <button type="submit" class="mt-0 flex items-center justify-center rounded-full border-none bg-transparent p-1 text-muted transition-colors hover:bg-border/60 hover:text-fg {% if comment.user_vote == 1 %}text-upvote hover:text-upvote{% endif %}" aria-label="Upvote">
                <svg viewBox="0 0 20 20" fill="currentColor" class="h-3 w-3"><path d="M10 6l6 7H4l6-7z"/></svg>
            </button>
        </form>
    {% else %}
        <span class="flex items-center justify-center p-1 text-border">
            <svg viewBox="0 0 20 20" fill="currentColor" class="h-3 w-3"><path d="M10 6l6 7H4l6-7z"/></svg>
        </span>
    {% endif %}
    <span class="min-w-4 text-center text-xs font-bold text-fg">{{ comment.score }}</span>
    {% if user.is_authenticated %}
        <form method="post" action="{% url 'comment-downvote' comment.pk %}" class="inline">
            {% csrf_token %}
            <button type="submit" class="mt-0 flex items-center justify-center rounded-full border-none bg-transparent p-1 text-muted transition-colors hover:bg-border/60 hover:text-fg {% if comment.user_vote == -1 %}text-downvote hover:text-downvote{% endif %}" aria-label="Downvote">
                <svg viewBox="0 0 20 20" fill="currentColor" class="h-3 w-3"><path d="M10 14l-6-7h12l-6 7z"/></svg>
            </button>
        </form>
    {% else %}
        <span class="flex items-center justify-center p-1 text-border">
            <svg viewBox="0 0 20 20" fill="currentColor" class="h-3 w-3"><path d="M10 14l-6-7h12l-6 7z"/></svg>
        </span>
    {% endif %}
</span>
