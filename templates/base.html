<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Chatter{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <header class="site-header">
        <a href="{% url 'feed' %}" class="brand">Chatter</a>
        <nav>
            {% if user.is_authenticated %}
                <a href="{% url 'post-create' %}">New post</a>
                <a href="{% url 'profile' user.username %}">{{ user.username }}</a>
                <form action="{% url 'logout' %}" method="post" class="inline-form">
                    {% csrf_token %}
                    <button type="submit" class="link-button">Log out</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}">Log in</a>
                <a href="{% url 'register' %}">Register</a>
            {% endif %}
        </nav>
    </header>
    <main>
        {% if messages %}
            <ul class="messages">
                {% for message in messages %}
                    <li class="{{ message.tags }}">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
