<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Chatter{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/tailwind.css">
</head>
<body class="mx-auto max-w-[700px] px-4 leading-relaxed text-gray-900">
    <header class="flex items-center justify-between border-b border-gray-200 py-4">
        <a href="{% url 'feed' %}" class="text-xl font-bold text-gray-900 no-underline">Chatter</a>
        <nav>
            {% if user.is_authenticated %}
                <a href="{% url 'post-create' %}" class="ml-4">New post</a>
                <a href="{% url 'profile' user.username %}" class="ml-4">{{ user.username }}</a>
                <form action="{% url 'logout' %}" method="post" class="inline">
                    {% csrf_token %}
                    <button type="submit" class="ml-4 mt-0 border-none bg-transparent p-0 text-accent underline cursor-pointer">Log out</button>
                </form>
            {% else %}
                <a href="{% url 'login' %}" class="ml-4">Log in</a>
                <a href="{% url 'register' %}" class="ml-4">Register</a>
            {% endif %}
        </nav>
    </header>
    <main class="py-4">
        {% if messages %}
            <ul class="mb-4 list-none p-0">
                {% for message in messages %}
                    <li class="{{ message.tags }}">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
