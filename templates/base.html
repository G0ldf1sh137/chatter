<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Chatter{% endblock %}</title>
    <link rel="stylesheet" href="/static/css/tailwind.css">
    <script>
        (function () {
            var stored = localStorage.getItem("theme");
            var dark = stored ? stored === "dark" : window.matchMedia("(prefers-color-scheme: dark)").matches;
            document.documentElement.classList.toggle("dark", dark);
        })();

        function toggleTheme() {
            var dark = document.documentElement.classList.toggle("dark");
            localStorage.setItem("theme", dark ? "dark" : "light");
        }
    </script>
</head>
<body class="min-h-screen bg-bg text-fg">
    {% include "_header.html" %}
    <main class="mx-auto max-w-[700px] px-4 py-6">
        {% if messages %}
            <ul class="mb-4 list-none space-y-2 p-0">
                {% for message in messages %}
                    <li class="rounded-xl border border-border bg-surface px-4 py-2 text-sm {{ message.tags }}">{{ message }}</li>
                {% endfor %}
            </ul>
        {% endif %}
        {% block content %}{% endblock %}
    </main>
</body>
</html>
