{% load avatar_extras %}
{% if size == "lg" %}
    {% if avatar_user.profile.avatar %}
        <img src="{{ avatar_user.profile.avatar.url }}" alt="{{ avatar_user.username }}" class="h-20 w-20 flex-shrink-0 rounded-full object-cover shadow-sm ring-4 ring-surface">
    {% else %}
        <div class="flex h-20 w-20 flex-shrink-0 items-center justify-center rounded-full bg-gradient-to-br {{ avatar_user.username|avatar_gradient }} text-2xl font-bold text-white shadow-sm ring-4 ring-surface">{{ avatar_user.username|slice:":1"|upper }}</div>
    {% endif %}
{% else %}
    {% if avatar_user.profile.avatar %}
        <img src="{{ avatar_user.profile.avatar.url }}" alt="{{ avatar_user.username }}" class="h-6 w-6 flex-shrink-0 rounded-full object-cover ring-1 ring-surface">
    {% else %}
        <div class="flex h-6 w-6 flex-shrink-0 items-center justify-center rounded-full bg-gradient-to-br {{ avatar_user.username|avatar_gradient }} text-[10px] font-bold text-white ring-1 ring-surface">{{ avatar_user.username|slice:":1"|upper }}</div>
    {% endif %}
{% endif %}
