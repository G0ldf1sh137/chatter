{% if avatar_user.profile.avatar %}
    <img src="{{ avatar_user.profile.avatar.url }}" alt="{{ avatar_user.username }}" class="h-6 w-6 flex-shrink-0 rounded-full object-cover">
{% else %}
    <div class="flex h-6 w-6 flex-shrink-0 items-center justify-center rounded-full bg-accent text-xs font-bold text-white">{{ avatar_user.username|slice:":1"|upper }}</div>
{% endif %}
